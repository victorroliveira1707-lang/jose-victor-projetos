<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humanizer — texto de IA → voz humana</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Lora:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0907;--bg2:#0d0f12;--bg3:#100e0a;
  --cold:#6a8aaa;--cold-dim:#253040;--cold-border:#1a2535;--cold-accent:#3a6a9a;
  --warm:#c8a86a;--warm-dim:#3a2a10;--warm-border:#2a1e0a;--warm-accent:#c9973a;
  --text:#f0e6d0;--muted:#5a5044;--border:#1e1a15;
  --danger:#c94a3a;--danger-dim:#3a1510;
}
body{background:var(--bg);min-height:100vh;font-family:'DM Mono',monospace;color:var(--text)}
.app{padding:2.5rem 2rem 3rem;max-width:960px;margin:0 auto}

/* Header */
.header{text-align:center;margin-bottom:2rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:300;color:var(--text);letter-spacing:-.02em;line-height:1}
.logo em{font-style:italic;color:var(--warm-accent)}
.tagline{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:.6rem}

/* Lang toggle */
.lang-toggle{display:flex;justify-content:center;gap:0;margin-bottom:1.8rem}
.lang-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1rem;cursor:pointer;transition:all .2s}
.lang-btn:first-child{border-radius:4px 0 0 4px}
.lang-btn:last-child{border-radius:0 4px 4px 0;border-left:none}
.lang-btn.active{background:var(--warm-accent);border-color:var(--warm-accent);color:#0a0907}

/* AI score bar */
.ai-score-wrap{margin-bottom:1rem;display:none}
.ai-score-wrap.visible{display:block}
.ai-score-label{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;display:flex;justify-content:space-between}
.ai-score-label span{color:var(--warm-accent)}
.ai-score-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.ai-score-fill{height:100%;background:linear-gradient(to right,var(--warm-accent),var(--danger));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
.ai-patterns{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem}
.ai-tag{font-size:.58rem;padding:.2rem .5rem;border-radius:3px;background:var(--danger-dim);color:#e87a6a;font-family:'DM Mono',monospace;letter-spacing:.05em}

/* Panels */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel{display:flex;flex-direction:column}
.panel-cold{background:var(--bg2);border-right:1px solid var(--border)}
.panel-warm{background:var(--bg3)}
.panel-label{display:flex;align-items:center;gap:.5rem;padding:.75rem 1.1rem;border-bottom:1px solid var(--border);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase}
.panel-cold .panel-label{color:var(--cold-accent)}
.panel-warm .panel-label{color:var(--warm-dim)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-cold{background:var(--cold-accent)}
.dot-warm{background:var(--warm-accent)}
textarea{width:100%;flex:1;background:transparent;border:none;outline:none;resize:none;padding:1.2rem 1.1rem;line-height:1.85;min-height:260px}
#input-text{color:var(--cold);caret-color:var(--cold-accent);font-family:'DM Mono',monospace;font-size:.82rem}
#input-text::placeholder{color:var(--cold-dim)}
#output-text{color:var(--warm);font-family:'Lora',serif;font-style:italic;font-size:.88rem;cursor:default}
#output-text::placeholder{color:var(--warm-dim);font-family:'DM Mono',monospace;font-style:normal;font-size:.75rem}
.stats-bar{display:flex;justify-content:space-between;padding:.5rem 1.1rem;border-top:1px solid var(--border);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase}
.stat-cold{color:var(--cold-dim)}
.stat-cold span{color:var(--cold-accent)}
.stat-warm{color:var(--warm-dim)}
.stat-warm span{color:var(--warm-accent)}

/* Controls */
.controls{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.4rem;background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;gap:1rem;flex-wrap:wrap}
.intensity-wrap{display:flex;align-items:center;gap:.6rem;font-size:.6rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.intensity-wrap label{color:var(--warm-dim)}
.slider{-webkit-appearance:none;appearance:none;width:90px;height:2px;background:linear-gradient(to right,var(--warm-accent) 0%,var(--border) 100%);outline:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--warm-accent);cursor:pointer}
#intensity-label{color:var(--warm-accent);min-width:2.5rem}
.btn-group{display:flex;gap:.6rem}
.btn{position:relative;background:transparent;border:1px solid var(--warm-accent);color:var(--warm-accent);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:.6rem 1.6rem;border-radius:6px;cursor:pointer;overflow:hidden;transition:color .25s}
.btn::before{content:'';position:absolute;inset:0;background:var(--warm-accent);transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.btn:hover::before{transform:scaleX(1)}
.btn:hover{color:#0a0907}
.btn span{position:relative;z-index:1}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn:disabled::before{display:none}
.btn-secondary{border-color:var(--border);color:var(--muted)}
.btn-secondary::before{background:var(--border)}
.btn-secondary:hover{color:var(--text)}

/* Animations */
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.2}}
.processing .dot-warm{animation:pulse-dot .55s infinite}
@keyframes slidein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.copy-btn{background:none;border:none;color:var(--warm-dim);font-size:.58rem;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:.15rem .35rem;transition:color .2s;margin-left:auto}
.copy-btn:hover{color:var(--warm-accent)}

@media(max-width:640px){
  .panels{grid-template-columns:1fr}
  .panel-cold{border-right:none;border-bottom:1px solid var(--border)}
  .logo{font-size:2.4rem}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">hum<em>a</em>nizer</div>
    <div class="tagline" id="tagline">máquina → alma · texto de IA → voz humana</div>
  </div>

  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('pt')">PT</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>

  <div class="ai-score-wrap" id="score-wrap">
    <div class="ai-score-label"><span id="score-label">Detecção de padrões de IA</span><span id="score-pct">0%</span></div>
    <div class="ai-score-bar"><div class="ai-score-fill" id="score-fill"></div></div>
    <div class="ai-patterns" id="ai-tags"></div>
  </div>

  <div class="panels">
    <div class="panel panel-cold">
      <div class="panel-label"><span class="dot dot-cold"></span><span id="lbl-input">texto original</span></div>
      <textarea id="input-text"></textarea>
      <div class="stats-bar">
        <span class="stat-cold"><span id="lbl-words-in">palavras</span>: <span id="wc-in">0</span></span>
        <span class="stat-cold"><span id="lbl-sents-in">frases</span>: <span id="sc-in">0</span></span>
      </div>
    </div>

    <div class="panel panel-warm" id="warm-panel">
      <div class="panel-label">
        <span class="dot dot-warm" id="warm-dot"></span>
        <span id="lbl-output">voz humanizada</span>
        <button class="copy-btn" id="copy-btn">copiar</button>
      </div>
      <textarea id="output-text" readonly></textarea>
      <div class="stats-bar">
        <span class="stat-warm"><span id="lbl-words-out">palavras</span>: <span id="wc-out">0</span></span>
        <span class="stat-warm"><span id="lbl-sents-out">frases</span>: <span id="sc-out">0</span></span>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="intensity-wrap">
      <label id="lbl-intensity">intensidade</label>
      <input type="range" class="slider" id="intensity" min="1" max="3" value="2">
      <span id="intensity-label">média</span>
    </div>
    <div class="btn-group">
      <button class="btn btn-secondary" id="btn-clear"><span id="lbl-clear">limpar</span></button>
      <button class="btn" id="btn-humanize"><span id="lbl-btn">▶ humanizar</span></button>
    </div>
  </div>
</div>

<script>
let currentLang = 'pt';

const i18n = {

    inputLabel: 'texto original',

    wordsLabel: 'palavras',
    sentsLabel: 'frases',
    intensityLabel: 'intensidade',
    levels: ['suave','média','forte'],
    btnLabel: '▶ humanizar',
    clearLabel: 'limpar',
    copyLabel: 'copiar',
    copiedLabel: 'copiado ✓',
    scoreLabel: 'Detecção de padrões de IA',
    inputPlaceholder: 'Cole aqui o texto gerado por IA...\n\nPode ser formal demais, repetitivo, ou simplesmente robótico. Sem julgamentos.',
    outputPlaceholder: 'O resultado aparece aqui...\n\nMais direto. Mais vivo. Mais você.',
  },
  en: {
    tagline: 'machine → soul · AI text → human voice',
    inputLabel: 'original text',
    outputLabel: 'humanized voice',
    wordsLabel: 'words',
    sentsLabel: 'sentences',
    intensityLabel: 'intensity',
    levels: ['light','medium','strong'],
    btnLabel: '▶ humanize',
    clearLabel: 'clear',
    copyLabel: 'copy',
    copiedLabel: 'copied ✓',
    scoreLabel: 'AI pattern detection',
    inputPlaceholder: 'Paste AI-generated text here...\n\nToo formal, repetitive, or just robotic. No judgment.',
    outputPlaceholder: 'Result appears here...\n\nMore direct. More alive. More you.',
  }

const replacementsPT = [

  [/\butilização\b/gi,'uso'],

  [/\bno tocante a\b/gi,'sobre'],
  [/\bsupramencionado\b/gi,'citado acima'],
  [/\bem virtude de\b/gi,'por causa de'],
  [/\bdevido ao fato de que\b/gi,'porque'],
  [/\bpor meio de\b/gi,'por'],
  [/\bpor intermédio de\b/gi,'através de'],
  [/\bnecessário se faz\b/gi,'é preciso'],
  [/\bcumpre salientar\b/gi,'vale lembrar'],
  [/\bé mister\b/gi,'é preciso'],
  [/\bpor sua vez\b/gi,'já'],
  [/\bde forma a\b/gi,'para'],

  [/\bcom o objetivo de\b/gi,'para'],

  [/\bescalável\b/gi,'que cresce bem'],
];

const replacementsEN = [
  [/\bit is important to note that\b/gi,"it's worth noting that"],
  [/\bit is worth mentioning that\b/gi,"worth saying:"],
  [/\bit is crucial to highlight\b/gi,"the key thing is"],
  [/\bas previously mentioned\b/gi,"as I said"],

  [/\bholistic\b/gi,"broad"],

  [/\bstate-of-the-art\b/gi,"cutting-edge"],
  [/\bcutting-edge\b/gi,"latest"],
  [/\bin light of\b/gi,"given"],
  [/\bprior to\b/gi,"before"],
  [/\bsubsequent to\b/gi,"after"],
  [/\bensure\b/gi,"make sure"],
  [/\bfacilitate\b/gi,"help"],
  [/\bimplement\b/gi,"set up"],
  [/\bdemonstrate\b/gi,"show"],
  [/\bit is evident that\b/gi,"clearly"],
  [/\bone can observe that\b/gi,"you can see that"],
  [/\bit can be seen that\b/gi,"as you can see"],
  [/\bthe aforementioned\b/gi,"the above"],
  [/\bthe latter\b/gi,"this"],
  [/\bthe former\b/gi,"the first"],
];

const aiPatternsPT = [
  'é importante salientar','é fundamental destacar','como mencionado anteriormente',
  'sendo assim','portanto','contudo','entretanto','haja vista','não obstante',
  'à luz de','em virtude de','por conseguinte','sinergia','paradigma','otimização',
  'viabilizar','potencializar','corroborar','subsidiar','supramencionado',
  'apresenta-se','verifica-se','observa-se','salienta-se','conforme exposto',
];

const aiPatternsEN = [
  'it is important to note','as previously mentioned','furthermore','moreover',
  'additionally','in conclusion','in summary','consequently','therefore',
  'utilize','leverage','optimize','synergy','paradigm','robust','scalable',
  'stakeholders','moving forward','at this juncture','impactful','proactive',
  'seamless','state-of-the-art','it is evident that','the aforementioned',
];

const fillersLowPT = ['Na prática, ','Olha, ','Pra ser direto: ','Basicamente, '];
const fillersHighPT = ['Sabe como é — ','Bom, ','Honestamente, ','Olha só: ','Deixa eu ser direto: ','No fundo, ','Pensa bem: ','A real é que '];
const fillersLowEN = ['Honestly, ','Look, ','Here\'s the thing: ','Basically, '];
const fillersHighEN = ['Truth is, ','Look, ','Think about it — ','At the end of the day, ','Here\'s what I mean: ','The real story is ','Frankly, '];

function count(t){
  const w=t.trim()?t.trim().split(/\s+/).length:0;
  const s=t.trim()?t.split(/[.!?]+/).filter(x=>x.trim()).length:0;
  return{w,s};
}

function detectAI(text, lang){
  const patterns = lang==='pt' ? aiPatternsPT : aiPatternsEN;
  const found = patterns.filter(p=>text.toLowerCase().includes(p.toLowerCase()));
  const score = Math.min(100, Math.round((found.length/patterns.length)*100*3));
  return {score, found};
}

function humanize(text, level, lang){
  let t=text;
  const replacements = lang==='pt' ? replacementsPT : replacementsEN;
  for(const [pattern,replacement] of replacements){
    t=t.replace(pattern,replacement);
  }
  if(level>=2){
    const sentences=t.split(/(?<=[.!?])\s+/);
    const fillersLow = lang==='pt'?fillersLowPT:fillersLowEN;
    const fillersHigh = lang==='pt'?fillersHighPT:fillersHighEN;
    const fillers=level===3?fillersHigh:fillersLow;
    const result=sentences.map((s,i)=>{
      if(i===0||i===sentences.length-1)return s;
      if(s.length>60&&Math.random()<(level===3?.35:.18)){
        return fillers[Math.floor(Math.random()*fillers.length)]+s.charAt(0).toLowerCase()+s.slice(1);
      }
      return s;
    });
    t=result.join(' ');
  }
  if(level>=3){
    t=t.replace(/\. ([A-Z])/g,(m,c)=>{
      if(Math.random()<.25)return `.\n\n${c}`;
      return m;
    });
    t=t.replace(/([^.!?]{80,}),([^.!?]{20,}\.)/g,(m,a,b)=>{
      if(Math.random()<.3){
        const conj=lang==='pt'?'E':'And';
        return `${a}. ${conj}${b}`;
      }
      return m;
    });
  }
  return t.replace(/  +/g,' ').trim();
}

function setLang(lang){
  currentLang=lang;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&lang==='pt')||(i===1&&lang==='en'));
  });
  const t=i18n[lang];
  document.getElementById('tagline').textContent=t.tagline;
  document.getElementById('lbl-input').textContent=t.inputLabel;
  document.getElementById('lbl-output').textContent=t.outputLabel;
  document.getElementById('lbl-words-in').textContent=t.wordsLabel;
  document.getElementById('lbl-sents-in').textContent=t.sentsLabel;
  document.getElementById('lbl-words-out').textContent=t.wordsLabel;
  document.getElementById('lbl-sents-out').textContent=t.sentsLabel;
  document.getElementById('lbl-intensity').textContent=t.intensityLabel;
  document.getElementById('lbl-btn').textContent=t.btnLabel;
  document.getElementById('lbl-clear').textContent=t.clearLabel;
  document.getElementById('copy-btn').textContent=t.copyLabel;
  document.getElementById('score-label').textContent=t.scoreLabel;
  document.getElementById('input-text').placeholder=t.inputPlaceholder;
  document.getElementById('output-text').placeholder=t.outputPlaceholder;
  const lv=parseInt(document.getElementById('intensity').value);
  document.getElementById('intensity-label').textContent=t.levels[lv-1];
  updateAIScore();
}

function updateAIScore(){
  const text=document.getElementById('input-text').value;
  if(!text.trim()){
    document.getElementById('score-wrap').classList.remove('visible');
    return;
  }
  const {score,found}=detectAI(text,currentLang);
  const wrap=document.getElementById('score-wrap');
  wrap.classList.add('visible');
  document.getElementById('score-fill').style.width=score+'%';
  document.getElementById('score-pct').textContent=score+'%';
  const tagsEl=document.getElementById('ai-tags');
  tagsEl.innerHTML='';
  found.slice(0,8).forEach(p=>{
    const tag=document.createElement('span');
    tag.className='ai-tag';
    tag.textContent=p;
    tagsEl.appendChild(tag);
  });
}

const inp=document.getElementById('input-text');
const out=document.getElementById('output-text');
const btn=document.getElementById('btn-humanize');
const intensitySlider=document.getElementById('intensity');
const warmDot=document.getElementById('warm-dot');

intensitySlider.addEventListener('input',()=>{
  document.getElementById('intensity-label').textContent=i18n[currentLang].levels[intensitySlider.value-1];
});

inp.addEventListener('input',()=>{
  const c=count(inp.value);
  document.getElementById('wc-in').textContent=c.w;
  document.getElementById('sc-in').textContent=c.s;
  updateAIScore();
});

btn.addEventListener('click',async()=>{
  const text=inp.value.trim();
  if(!text)return;
  const level=parseInt(intensitySlider.value);
  btn.disabled=true;
  document.getElementById('warm-panel').classList.add('processing');
  out.value='';
  document.getElementById('wc-out').textContent='0';
  document.getElementById('sc-out').textContent='0';
  await new Promise(r=>setTimeout(r,600));
  const result=humanize(text,level,currentLang);
  let i=0;
  const speed=Math.max(8,Math.min(25,2000/result.length));
  const timer=setInterval(()=>{
    i+=Math.ceil(result.length/160);
    out.value=result.slice(0,i);
    if(i>=result.length){
      out.value=result;
      clearInterval(timer);
      btn.disabled=false;
      document.getElementById('warm-panel').classList.remove('processing');
      const c=count(result);
      document.getElementById('wc-out').textContent=c.w;
      document.getElementById('sc-out').textContent=c.s;
    }
  },speed);
});

document.getElementById('btn-clear').addEventListener('click',()=>{
  inp.value='';out.value='';
  document.getElementById('wc-in').textContent='0';
  document.getElementById('sc-in').textContent='0';
  document.getElementById('wc-out').textContent='0';
  document.getElementById('sc-out').textContent='0';
  document.getElementById('score-wrap').classList.remove('visible');
});

document.getElementById('copy-btn').addEventListener('click',()=>{
  if(!out.value)return;
  navigator.clipboard.writeText(out.value).then(()=>{
    const t=i18n[currentLang];
    const btn=document.getElementById('copy-btn');
    btn.textContent=t.copiedLabel;
    setTimeout(()=>btn.textContent=t.copyLabel,1800);
  });
});

setLang('pt');
</script>
</body>
</html>
